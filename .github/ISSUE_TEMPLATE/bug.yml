name: Bug Report
description: Report a bug in @vllnt/next-llms
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal Reproduction
      description: Code or steps to reproduce the issue.
      render: typescript
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: next-version
    attributes:
      label: Next.js Version (if applicable)
      placeholder: "15.0.0"
    validations:
      required: false
